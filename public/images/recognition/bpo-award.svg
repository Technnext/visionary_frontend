  <!-- Trophy handles -->
  <path d="M60 58 h-14 a10 10 0 0 0 0 20 h14" fill="none" stroke="#ff6b00" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M100 58 h14 a10 10 0 0 1 0 20 h-14" fill="none" stroke="#ff6b00" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Stem and base -->
  <line x1="80" y1="108" x2="80" y2="120" stroke="#ff6b00" stroke-width="4" stroke-linecap="round"/>
  <rect x="58" y="120" width="44" height="8" rx="4" fill="#ff6b00"/>
  <!-- Star inside cup -->
  <polygon points="80,62 83,72 93,72 85,78 88,88 80,82 72,88 75,78 67,72 77,72" fill="#ffffff" opacity="0.9"/>
  <!-- Year ring -->
