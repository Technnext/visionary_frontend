<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <rect width="160" height="160" rx="16" fill="#003087"/>
  <!-- Outer decorative ring -->
  <circle cx="80" cy="80" r="68" fill="none" stroke="#1a4faa" stroke-width="2"/>
  <!-- 8-point starburst background -->
  <polygon points="80,20 86,60 110,46 96,70 136,74 102,86 116,114 86,100 80,140 74,100 44,114 58,86 24,74 64,70 50,46 74,60"
           fill="#ff6b00" opacity="0.15"/>
  <!-- Large 5-point star -->
  <polygon points="80,38 89,66 120,66 96,84 105,112 80,94 55,112 64,84 40,66 71,66"
           fill="#ff6b00" stroke="#ff6b00" stroke-width="1"/>
  <!-- Inner star highlight -->
  <polygon points="80,50 86,68 104,68 90,78 96,96 80,86 64,96 70,78 56,68 74,68"
           fill="#ffffff" opacity="0.25"/>
  <!-- Center gem -->
  <circle cx="80" cy="75" r="10" fill="#ffffff" opacity="0.9"/>
  <!-- EXCELLENCE text -->
  <text x="80" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" letter-spacing="1.5" opacity="0.85">EXCELLENCE</text>
</svg>
